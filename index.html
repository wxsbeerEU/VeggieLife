<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lekker Vegetarisch Recept 🍝</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Playfair+Display:ital,wght@0,600;1,400&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Fredoka', sans-serif;
            background: #faf6f0; 
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
            padding: 20px;
            transition: background 0.6s ease;
        }

        .container {
            background-color: #ffffff;
            padding: 35px 20px;
            border-radius: 24px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.06);
            width: 100%;
            max-width: 350px;
            text-align: center;
            z-index: 10; /* Zorgt dat de kader stevig op de achtergrond staat t.o.v. de weglopende knop */
            border: 2px solid #e6dfd5;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .food-image {
            font-size: 70px;
            margin-bottom: 15px;
            transition: all 0.5s ease;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            color: #2c3e50;
            font-size: 1.7em;
            margin-bottom: 12px;
            line-height: 1.2;
        }

        p {
            color: #7f8c8d;
            font-size: 1.05em;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .buttons-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 70px;
            position: relative;
            width: 100%;
        }

        button {
            padding: 16px 32px;
            font-size: 1.15em;
            font-weight: 700;
            border: none;
            border-radius: 18px;
            cursor: pointer;
            font-family: 'Fredoka', sans-serif;
            box-shadow: 0 6px 15px rgba(0,0,0,0.08);
        }

        /* Enige knop in het begin: groot en groen */
        #yesBtn {
            background: linear-gradient(135deg, #27ae60 0%, #1e8449 100%);
            color: white;
            width: 100%;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-origin: center;
            z-index: 15;
        }

        /* Verborgen in het begin, krijgt later absolute krachten */
        #noBtn {
            display: none;
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
            color: white;
            white-space: nowrap;
            z-index: 9999; /* ALTIJD BOVENOP ALLES */
            box-shadow: 0 8px 20px rgba(231, 76, 60, 0.3);
            position: absolute;
        }

        /* --- STYLES VOOR DE DATE PLOTTWIST --- */
        body.date-mode {
            background: linear-gradient(135deg, #ffe6e6 0%, #ffb3d9 100%);
        }

        body.date-mode .container {
            background-color: rgba(255, 255, 255, 0.96);
            border-radius: 28px;
            box-shadow: 0 15px 35px rgba(214, 48, 49, 0.15);
            border: 3px solid #ff99c8;
        }

        body.date-mode h1 {
            font-family: 'Fredoka', sans-serif;
            color: #d63031;
            font-size: 1.9em;
        }

        body.date-mode p {
            color: #4f5d75;
            font-size: 1.15em;
        }

        body.date-mode #yesBtn {
            background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
            width: auto; /* Krijgt normale grootte zodat er ruimte komt */
            padding: 14px 35px;
        }
    </style>
</head>
<body>

    <div class="container" id="mainContainer">
        <div id="icon" class="food-image">🇮🇹🍝</div>
        <h1 id="title">Romige Gnocchi met Burrata</h1>
        <p id="question">Met zongedroogde tomaatjes, romige burrata, geroosterde pijnboompitten en verse basilicum. Zullen we dit binnenkort samen koken?</p>
        
        <div class="buttons-wrapper" id="btnContainer">
            <!-- Alleen deze knop is zichtbaar bij de start -->
            <button id="yesBtn" onclick="revealDatePrompt()">JA, HEERLIJK! 😍</button>
        </div>
    </div>

    <!-- De Nee-knop leeft los in de body zodat hij overal BUITEN de kader kan vliegen -->
    <button id="noBtn" ontouchstart="moveButton(event)" onclick="moveButton(event)">Nee 😢</button>

    <script>
        const noBtn = document.getElementById('noBtn');
        const yesBtn = document.getElementById('yesBtn');
        const icon = document.getElementById('icon');
        const question = document.getElementById('question');
        const title = document.getElementById('title');
        const btnContainer = document.getElementById('btnContainer');
        const mainContainer = document.getElementById('mainContainer');

        let noCount = 0;
        let yesSize = 1;
        let isDateMode = false;

        const noTexts = [
            "Nee 😢", "Wacht, echt?", "Weet je het zeker?", 
            "Huh, mis!", "Klik de groene!", "Mijn hart breekt..", 
            "Geef maar op! 😉", "Nog steeds nee?!"
        ];

        const emojis = ["👉👈", "🥺", "🧐", "😭", "😤", "🙄", "😈"];

        function revealDatePrompt() {
            if (!isDateMode) {
                isDateMode = true;
                
                // Schakel over naar Date-Modus
                document.body.classList.add('date-mode');
                
                // Update de content
                icon.innerText = "👉👈";
                icon.style.fontSize = "65px";
                title.innerHTML = "Oeps... Verrassing! 🤭";
                question.innerHTML = "We gaan helemaal niet koken. Ik neem je gewoon lekker mee uit eten! Wil je met mij op date? ❤️";
                
                // Pas de JA-knop aan
                yesBtn.innerText = "JA! 🎉";
                yesBtn.setAttribute("onclick", "celebrate()");
                
                // Activeer en positioner de Nee-knop initieel NETJES onder de JA-knop, binnen de wrapper
                noBtn.style.display = "inline-block";
                
                // Bereken startpositie voor de Nee-knop onder de JA-knop
                const rect = yesBtn.getBoundingClientRect();
                noBtn.style.left = (rect.left + (rect.width / 2) - 45) + 'px';
                noBtn.style.top = (rect.bottom + 15) + 'px';
                
                // Ruimte maken in de container voor de initiele knoppen-look
                btnContainer.style.minHeight = "130px";
            }
        }

        function moveButton(event) {
            if (event) event.preventDefault();

            noCount++;
            
            noBtn.innerText = noTexts[Math.min(noCount, noTexts.length - 1)];
            icon.innerText = emojis[Math.min(noCount, emojis.length - 1)];

            // JA-knop groeit groter
            yesSize += 0.25;
            yesBtn.style.transform = `scale(${yesSize})`;

            // Verkrijg de positie van de witte container
            const containerRect = mainContainer.getBoundingClientRect();
            const padding = 25;
            const btnWidth = noBtn.offsetWidth;
            const btnHeight = noBtn.offsetHeight;

            let randomX, randomY;
            let insideContainer = true;

            // Blijf coördinaten genereren totdat de knop GEGARANDEERD buiten de witte kader valt
            while (insideContainer) {
                randomX = Math.max(padding, Math.floor(Math.random() * (window.innerWidth - btnWidth - padding)));
                randomY = Math.max(padding, Math.floor(Math.random() * (window.innerHeight - btnHeight - padding)));

                // Check of de gegenereerde coördinaten overlappen met de witte container
                const hitsContainerX = (randomX + btnWidth > containerRect.left - 10) && (randomX < containerRect.right + 10);
                const hitsContainerY = (randomY + btnHeight > containerRect.top - 10) && (randomY < containerRect.bottom + 10);

                if (!(hitsContainerX && hitsContainerY)) {
                    insideContainer = false; // Positie is veilig buiten de kader!
                }
            }

            // Verplaats de knop definitief
            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
        }

        function celebrate() {
            confetti({ particleCount: 160, spread: 80, origin: { y: 0.6 } });

            icon.innerText = "🥰🎉";
            title.innerHTML = "Woehoe, JA! 🥂❤️";
            question.innerHTML = "Beste keuze ooit! Je wordt nu doorgestuurd naar WhatsApp om het te bezegelen...";
            
            btnContainer.style.display = 'none';
            noBtn.style.display = 'none';

            setTimeout(() => {
                const text = encodeURIComponent("Ja, ik wil heel graag met je op date! Geen gnocchi, maar echt uit eten! 🥂❤️");
                window.location.href = `https://wa.me/?text=${text}`;
            }, 1800);
        }
    </script>

</body>
</html>
