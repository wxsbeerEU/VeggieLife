<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Belangrijke vraag... ❤️</title>
    
    <!-- Speels lettertype -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    
    <!-- Confetti Library -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent; /* Voorkomt blauwe flits op mobiel */
        }

        body {
            font-family: 'Fredoka', sans-serif;
            background: linear-gradient(135deg, #ffe6e6 0%, #ffb3d9 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; /* Voorkomt scrollen op gsm */
            position: relative;
            padding: 20px;
        }

        .container {
            background-color: rgba(255, 255, 255, 0.95);
            padding: 30px 20px;
            border-radius: 25px;
            box-shadow: 0 10px 25px rgba(214, 48, 49, 0.15);
            width: 100%;
            max-width: 360px; /* Perfecte breedte voor gsm */
            text-align: center;
            z-index: 1;
            border: 3px solid #ff99c8;
        }

        .emoji-mascot {
            font-size: 65px;
            margin-bottom: 15px;
        }

        h1 {
            color: #d63031;
            font-size: 1.8em;
            margin-bottom: 10px;
        }

        p {
            color: #4f5d75;
            font-size: 1.1em;
            margin-bottom: 30px;
            line-height: 1.4;
        }

        /* Vaste ruimte voor de knoppen zodat ze niet over de tekst vallen */
        .buttons-area {
            position: relative;
            height: 120px; 
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        button {
            padding: 14px 28px;
            font-size: 1.1em;
            font-weight: 700;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            box-shadow: 0 5px 10px rgba(0,0,0,0.1);
            font-family: 'Fredoka', sans-serif;
        }

        #yesBtn {
            background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
            color: white;
            position: relative;
            transition: transform 0.2s ease;
            z-index: 5;
        }

        #noBtn {
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
            color: white;
            position: absolute; /* Begint binnen de buttons-area */
            right: 20px;
            z-index: 10;
            white-space: nowrap;
        }
    </style>
</head>
<body>

    <div class="container" id="mainContainer">
        <div id="emoji" class="emoji-mascot">👉👈</div>
        <h1 id="title">Hee! 😊</h1>
        <p id="question">Ik heb een hele belangrijke vraag voor je... Wil je met mij op date?</p>
        
        <div class="buttons-area" id="btnWrapper">
            <button id="yesBtn" onclick="celebrate()">JA! 🎉</button>
            <!-- Op gsm werkt ontouchstart (aanraken) veel beter dan mouseover -->
            <button id="noBtn" ontouchstart="moveButton(event)" onclick="moveButton(event)">Nee 😢</button>
        </div>
    </div>

    <script>
        const noBtn = document.getElementById('noBtn');
        const yesBtn = document.getElementById('yesBtn');
        const emoji = document.getElementById('emoji');
        const question = document.getElementById('question');
        const title = document.getElementById('title');
        const btnWrapper = document.getElementById('btnWrapper');

        let noCount = 0;
        let yesSize = 1;

        const noTexts = [
            "Nee 😢", "Wacht, echt?", "Weet je het zeker?", 
            "Huh, mis!", "Klik de groene!", "Mijn hart breekt..", 
            "Geef maar op! 😉", "Nog steeds nee?!"
        ];

        const emojis = ["👉👈", "🥺", "🧐", "😭", "😤", "🙄", "😈"];

        function moveButton(event) {
            // Voorkom dubbele clicks/taps op gsm
            if (event) event.preventDefault();

            noCount++;
            
            // Tekst en emoji veranderen
            noBtn.innerText = noTexts[Math.min(noCount, noTexts.length - 1)];
            emoji.innerText = emojis[Math.min(noCount, emojis.length - 1)];

            // JA-knop groeit gecontroleerd op gsm
            yesSize += 0.25;
            yesBtn.style.transform = `scale(${yesSize})`;

            // Bereken willekeurige positie over het HELE scherm, 
            // maar blijf 30px weg van de randen zodat hij niet buiten beeld valt
            const padding = 30;
            const maxX = window.innerWidth - noBtn.offsetWidth - padding;
            const maxY = window.innerHeight - noBtn.offsetHeight - padding;

            const randomX = Math.max(padding, Math.floor(Math.random() * maxX));
            const randomY = Math.max(padding, Math.floor(Math.random() * maxY));

            // Verplaats de nee-knop naar de absolute body zodat hij overal op het gsm-scherm kan vliegen
            document.body.appendChild(noBtn);
            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
        }

        function celebrate() {
            // Confetti effect
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });

            emoji.innerText = "🥰🎉";
            title.innerHTML = "Woehoe, JA! 🥂❤️";
            question.innerHTML = "Je wordt doorgestuurd naar WhatsApp om onze date te bezegelen...";
            
            // Knoppen weg
            btnWrapper.style.display = 'none';
            if (document.body.contains(noBtn)) noBtn.style.display = 'none';

            // Jouw automatische WhatsApp-bericht (opent na 1.5 seconde)
            setTimeout(() => {
                const text = encodeURIComponent("Ja, ik wil heel graag met je op date! 🥂❤️");
                // Dit opent automatisch WhatsApp op haar gsm
                window.location.href = `https://wa.me/?text=${text}`;
            }, 1500);
        }
    </script>

</body>
</html>
