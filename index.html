<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Belangrijke Vraag! ❤️</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ffe6e6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-align: center;
        }

        .container {
            background-color: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 400px;
            position: relative;
        }

        h1 {
            color: #d63031;
            margin-bottom: 10px;
        }

        p {
            color: #2d3436;
            font-size: 1.1em;
            margin-bottom: 30px;
        }

        .buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        button {
            padding: 12px 30px;
            font-size: 1em;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.1s ease;
        }

        #yesBtn {
            background-color: #2ecc71;
            color: white;
        }

        #yesBtn:hover {
            transform: scale(1.1);
        }

        #noBtn {
            background-color: #e74c3c;
            color: white;
            position: absolute;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Hee! 😊</h1>
        <p id="question">Wil je met mij op date?</p>
        
        <div class="buttons">
            <button id="yesBtn" onclick="celebrate()">JA! 🎉</button>
            <button id="noBtn" onmouseover="moveButton()" onclick="moveButton()">Nee 😢</button>
        </div>
    </div>

    <script>
        const noBtn = document.getElementById('noBtn');
        const question = document.getElementById('question');
        const yesBtn = document.getElementById('yesBtn');

        function moveButton() {
            // Bereken een willekeurige positie binnen het scherm
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth - 20);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight - 20);
            
            // Zet de knop vast op de body zodat hij overal kan springen
            document.body.appendChild(noBtn);
            
            noBtn.style.left = x + 'px';
            noBtn.style.top = y + 'px';
        }

        function celebrate() {
            question.innerHTML = "Woehoe! Het staat genoteerd! 🥂❤️ Ik stuur je zo een berichtje!";
            // Verberg de nee-knop als ze op Ja klikt
            noBtn.style.display = 'none';
            yesBtn.style.display = 'none';
        }
    </script>

</body>
</html>
