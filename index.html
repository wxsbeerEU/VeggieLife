<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Een Culinair Geheim... 🍃</title>
    
    <!-- Premium Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Playfair+Display:ital,wght@0,500;0,700;1,400&family=Plus+Jakarta+Sans:wght@400;600&display=swap" rel="stylesheet">
    
    <!-- Confetti Library -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root {
            --salie-bg: #f3f6f3;
            --salie-main: #87a987;
            --salie-dark: #4a634a;
            --salie-accent: #e3ebe3;
            
            --love-bg: linear-gradient(135deg, #fff0f0 0%, #ffd6e8 100%);
            --love-main: #ff7597;
            --love-container: rgba(255, 255, 255, 0.96);
            --love-border: #ffb3c6;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--salie-bg);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
            padding: 24px;
            transition: background 1.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Elegante organische achtergrondvormen */
        .bg-shape {
            position: absolute;
            background: var(--salie-accent);
            border-radius: 43% 57% 64% 36% / 41% 45% 55% 59%;
            z-index: 1;
            filter: blur(40px);
            opacity: 0.7;
            transition: all 1.2s ease;
        }

        .shape1 { width: 300px; height: 300px; top: -50px; right: -50px; }
        .shape2 { width: 250px; height: 250px; bottom: -50px; left: -50px; animation: morph 8s infinite alternate ease-in-out; }

        @keyframes morph {
            0% { border-radius: 43% 57% 64% 36% / 41% 45% 55% 59%; }
            100% { border-radius: 70% 30% 52% 48% / 60% 40% 60% 40%; }
        }

        /* Particle effect voor wegrennende knop */
        .trail-particle {
            position: absolute;
            z-index: 9998;
            pointer-events: none;
            animation: fadeOut 0.6s forwards ease-out;
            font-size: 20px;
        }

        @keyframes fadeOut {
            0% { transform: scale(1) translateY(0); opacity: 1; }
            100% { transform: scale(0.5) translateY(-20px); opacity: 0; }
        }

        /* De Main Display Card */
        .container {
            background-color: #ffffff;
            padding: 40px 28px;
            border-radius: 32px;
            box-shadow: 0 20px 50px rgba(135, 169, 135, 0.12);
            width: 100%;
            max-width: 360px;
            text-align: center;
            z-index: 10;
            border: 1px solid rgba(135, 169, 135, 0.2);
            position: relative;
            transition: all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* Visual Wrapper met zachte gloed */
        .visual-wrapper {
            width: 100px;
            height: 100px;
            background: var(--salie-accent);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 24px auto;
            box-shadow: inset 0 4px 10px rgba(0,0,0,0.02);
            transition: all 0.8s ease;
        }

        .food-image {
            font-size: 45px;
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        h1 {
            font-family: 'Playfair Display', serif;
            color: var(--salie-dark);
            font-size: 1.8em;
            font-weight: 700;
            margin-bottom: 14px;
            line-height: 1.3;
            transition: all 0.6s ease;
        }

        p {
            color: #6a7b6a;
            font-size: 1.05em;
            margin-bottom: 35px;
            line-height: 1.6;
            transition: all 0.6s ease;
        }

        .buttons-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 16px;
            min-height: 64px;
            position: relative;
            width: 100%;
        }

        /* High-End Button Base */
        button {
            padding: 16px 32px;
            font-size: 1.1em;
            font-weight: 600;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            letter-spacing: -0.2px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.05);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #yesBtn {
            background: var(--salie-main);
            color: white;
            width: 100%;
            transform-origin: center center;
        }

        #yesBtn:shadow {
            box-shadow: 0 10px 25px rgba(135, 169, 135, 0.4);
        }

        #noBtn {
            display: none;
            background: #ffffff;
            color: #666;
            border: 2px solid #eee;
            white-space: nowrap;
            z-index: 9999; 
            position: absolute;
        }

        /* ================= NEXT LEVEL TRANSITIE: DATE MODE ================= */
        body.date-mode {
            background: var(--love-bg);
            font-family: 'Fredoka', sans-serif;
        }

        body.date-mode .bg-shape {
            background: #ffebf0;
            opacity: 0.6;
        }

        body.date-mode .container {
            background-color: var(--love-container);
            border-radius: 36px;
            box-shadow: 0 25px 60px rgba(255, 117, 151, 0.18);
            border: 2px solid var(--love-border);
        }

        body.date-mode .visual-wrapper {
            background: #fff0f3;
            transform: scale(1.1);
        }

        body.date-mode h1 {
            font-family: 'Fredoka', sans-serif;
            color: #d63031;
            font-size: 2.1em;
            font-weight: 700;
        }

        body.date-mode p {
            color: #5c6b73;
            font-size: 1.15em;
        }

        body.date-mode button {
            font-family: 'Fredoka', sans-serif;
            font-weight: 700;
            border-radius: 22px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        body.date-mode #yesBtn {
            background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
            width: auto;
            flex: 1;
            box-shadow: 0 10px 25px rgba(46, 204, 113, 0.3);
        }

        body.date-mode #noBtn {
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
            color: white;
            border: none;
            flex: 1;
            box-shadow: 0 10px 25px rgba(231, 76, 60, 0.25);
        }

        /* Fix voor stabiele schaling */
        body.date-mode #yesBtn.growing {
            flex: none;
            width: 120px;
        }
    </style>
</head>
<body>

    <!-- Sferische sfeerelementen -->
    <div class="bg-shape shape1" id="s1"></div>
    <div class="bg-shape shape2" id="s2"></div>

    <div class="container" id="mainContainer">
        <div class="visual-wrapper" id="visualBg">
            <div id="icon" class="food-image">🍃🍝</div>
        </div>
        <h1 id="title">Gnocchi alla Salvia</h1>
        <p id="question">Zachtsmeltende gnocchi in een rijke saus van gebruinde salieboter, knapperige pijnboompitten en geraspte Parmezaan. Zullen we dit binnenkort samen maken?</p>
        
        <div class="buttons-wrapper" id="btnContainer">
            <button id="yesBtn" onclick="triggerOopsScreen()">JA, GEWELDIG! 😍</button>
            <button id="noBtn" ontouchstart="moveButton(event)" onclick="moveButton(event)">Nee 😢</button>
        </div>
    </div>

    <script>
        const noBtn = document.getElementById('noBtn');
        const yesBtn = document.getElementById('yesBtn');
        const icon = document.getElementById('icon');
        const question = document.getElementById('question');
        const title = document.getElementById('title');
        const btnContainer = document.getElementById('btnContainer');
        const mainContainer = document.getElementById('mainContainer');
        const visualBg = document.getElementById('visualBg');

        let noCount = 0;
        let yesSize = 1;
        let step = 1;

        const noTexts = [
            "Nee 😢", "Wacht, echt?", "Uhhh... mis!", 
            "Verkeerde knop!", "Klik de groene!", "Mijn hart... 💔", 
            "Geef maar op! 😘", "Echt niet! 😜"
        ];

        const emojis = ["👉👈", "🥺", "🧐", "😭", "😤", "🙄", "😈"];

        // STAP 2: De 'Oops' overgang met de gevraagde emoji
        function triggerOopsScreen() {
            if (step === 1) {
                step = 2;
                
                // Subtiele haptische trilling simuleren op mobiel indien ondersteund
                if (navigator.vibrate) navigator.vibrate(50);

                icon.innerText = "😬";
                title.innerHTML = "Oeps...";
                question.innerHTML = "Dit is eigenlijk helemaal geen recepten-website...";
                
                yesBtn.innerText = "Ok...";
                yesBtn.style.background = "#4a5568";
                yesBtn.style.boxShadow = "none";
                yesBtn.setAttribute("onclick", "revealDatePrompt()");
            }
        }

        // STAP 3: De ultieme switch naar het high-end date thema
        function revealDatePrompt() {
            if (step === 2) {
                step = 3;
                
                document.body.classList.add('date-mode');
                
                icon.innerText = "👉👈";
                title.innerHTML = "Verrassing! ✨";
                question.innerHTML = "We gaan lekker níét koken. Ik neem je gewoon écht mee uit eten! Wil je met mij op date? ❤️";
                
                yesBtn.innerText = "JA! 🎉";
                yesBtn.style.background = ""; 
                yesBtn.setAttribute("onclick", "celebrate()");
                
                noBtn.style.display = "inline-block";
            }
        }

        // NEXT LEVEL: Intelligent ontwijkings-mechanisme + Emoji deeltjesspoor
        function moveButton(event) {
            if (event) event.preventDefault();

            // Genereer een brekend hartje op de oude plek van de knop als visueel effect
            const rectBtnOld = noBtn.getBoundingClientRect();
            const particle = document.createElement('div');
            particle.classList.add('trail-particle');
            particle.innerText = noCount > 4 ? '💔' : '😢';
            particle.style.left = (rectBtnOld.left + window.scrollX + rectBtnOld.width / 2 - 10) + 'px';
            particle.style.top = (rectBtnOld.top + window.scrollY) + 'px';
            document.body.appendChild(particle);
            setTimeout(() => particle.remove(), 600);

            noCount++;
            noBtn.innerText = noTexts[Math.min(noCount, noTexts.length - 1)];
            icon.innerText = emojis[Math.min(noCount, emojis.length - 1)];

            // Schakel flexbox direct vloeiend uit zonder verspringing
            if (!yesBtn.classList.contains('growing')) {
                yesBtn.classList.add('growing');
            }

            // Rustige, perfect proportionele schaling
            yesSize += 0.08;
            yesBtn.style.transform = `scale(${yesSize})`;

            if (noBtn.style.position !== 'absolute') {
                noBtn.style.position = 'absolute';
                document.body.appendChild(noBtn);
            }

            const containerRect = mainContainer.getBoundingClientRect();
            const padding = 25;
            const btnWidth = noBtn.offsetWidth;
            const btnHeight = noBtn.offsetHeight;

            let randomX, randomY;
            let insideContainer = true;

            // Wiskundige grid-check: Blijf buiten de witte container
            while (insideContainer) {
                randomX = Math.max(padding, Math.floor(Math.random() * (window.innerWidth - btnWidth - padding)));
                randomY = Math.max(padding, Math.floor(Math.random() * (window.innerHeight - btnHeight - padding)));

                const hitsContainerX = (randomX + btnWidth > containerRect.left - 20) && (randomX < containerRect.right + 20);
                const hitsContainerY = (randomY + btnHeight > containerRect.top - 20) && (randomY < containerRect.bottom + 20);

                if (!(hitsContainerX && hitsContainerY)) {
                    insideContainer = false;
                }
            }

            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
        }

        // De grote ontknoping (Confetti-orkaan + WhatsApp redirection)
        function celebrate() {
            // Luxe gelaagde confetti
            const end = Date.now() + 3 * 1000;
            (function frame() {
                confetti({ particleCount: 5, angle: 60, spread: 55, origin: { x: 0, y: 0.8 }, colors: ['#ff7597', '#ffb3c6', '#2ecc71'] });
                confetti({ particleCount: 5, angle: 120, spread: 55, origin: { x: 1, y: 0.8 }, colors: ['#ff7597', '#ffb3c6', '#2ecc71'] });
                if (Date.now() < end) requestAnimationFrame(frame);
            }());

            icon.innerText = "🥰🎉";
            title.innerHTML = "Woehoe, YES! 🥂✨";
            question.innerHTML = "Geweldig! Je wordt nu omgeleid naar WhatsApp om de details door te spreken...";
            
            btnContainer.style.display = 'none';
            noBtn.style.display = 'none';

            setTimeout(() => {
                const text = encodeURIComponent("Ja, ik wil heel graag met je op date! Geen gnocchi, maar écht luxe uit eten! 🥂❤️");
                window.location.href = `https://wa.me/?text=${text}`;
            }, 2000);
        }
    </script>

</body>
</html>
