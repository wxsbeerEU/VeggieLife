<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lekker Vegetarisch Recept 🍝</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Playfair+Display:ital,wght@0,600;1,400&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Fredoka', sans-serif;
            background: #faf6f0; 
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
            padding: 20px;
            transition: background 0.6s ease;
        }

        .container {
            background-color: #ffffff;
            padding: 35px 20px;
            border-radius: 24px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.06);
            width: 100%;
            max-width: 350px;
            text-align: center;
            z-index: 10; 
            border: 2px solid #e6dfd5;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .food-image {
            font-size: 70px;
            margin-bottom: 15px;
            transition: all 0.5s ease;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            color: #2c3e50;
            font-size: 1.7em;
            margin-bottom: 12px;
            line-height: 1.2;
        }

        p {
            color: #7f8c8d;
            font-size: 1.05em;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        /* Flexbox zorgt ervoor dat de knoppen initieel ALTIJD perfect recht naast elkaar staan */
        .buttons-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            min-height: 60px;
            position: relative;
            width: 100%;
        }

        button {
            padding: 14px 28px;
            font-size: 1.1em;
            font-weight: 700;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            font-family: 'Fredoka', sans-serif;
            box-shadow: 0 6px 15px rgba(0,0,0,0.08);
        }

        /* De hoofdknoppen */
        #yesBtn {
            background: linear-gradient(135deg, #27ae60 0%, #1e8449 100%);
            color: white;
            width: 100%; /* Begint vullend */
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-origin: center;
        }

        /* Begint onzichtbaar totdat stap 3 start */
        #noBtn {
            display: none;
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
            color: white;
            white-space: nowrap;
            z-index: 9999; /* Zweeft overal bovenop zodra hij losbreekt */
            box-shadow: 0 8px 20px rgba(231, 76, 60, 0.3);
        }

        /* --- STYLES VOOR DE DATE PLOTTWIST (STAP 3) --- */
        body.date-mode {
            background: linear-gradient(135deg, #ffe6e6 0%, #ffb3d9 100%);
        }

        body.date-mode .container {
            background-color: rgba(255, 255, 255, 0.96);
            border-radius: 28px;
            box-shadow: 0 15px 35px rgba(214, 48, 49, 0.15);
            border: 3px solid #ff99c8;
        }

        body.date-mode h1 {
            font-family: 'Fredoka', sans-serif;
            color: #d63031;
            font-size: 1.9em;
        }

        body.date-mode p {
            color: #4f5d75;
            font-size: 1.15em;
        }

        body.date-mode #yesBtn {
            background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
            width: auto; /* Zorgt dat hij krimpt naar normale breedte naast de nee-knop */
            flex: 1;
        }

        body.date-mode #noBtn {
            flex: 1; /* Neemt netjes de helft van de ruimte in de container in */
        }
    </style>
</head>
<body>

    <div class="container" id="mainContainer">
        <!-- Start met het recept -->
        <div id="icon" class="food-image">🇮🇹🍝</div>
        <h1 id="title">Romige Gnocchi met Burrata</h1>
        <p id="question">Met zongedroogde tomaatjes, romige burrata, geroosterde pijnboompitten en verse basilicum. Zullen we dit binnenkort samen koken?</p>
        
        <div class="buttons-wrapper" id="btnContainer">
            <!-- Alleen de JA knop start in beeld -->
            <button id="yesBtn" onclick="triggerOopsScreen()">JA, HEERLIJK! 😍</button>
            
            <!-- De Nee knop staat hier klaar, maar is via CSS verborgen tot stap 3 -->
            <button id="noBtn" ontouchstart="moveButton(event)" onclick="moveButton(event)">Nee 😢</button>
        </div>
    </div>

    <script>
        const noBtn = document.getElementById('noBtn');
        const yesBtn = document.getElementById('yesBtn');
        const icon = document.getElementById('icon');
        const question = document.getElementById('question');
        const title = document.getElementById('title');
        const btnContainer = document.getElementById('btnContainer');
        const mainContainer = document.getElementById('mainContainer');

        let noCount = 0;
        let yesSize = 1;
        let step = 1;

        const noTexts = [
            "Nee 😢", "Wacht, echt?", "Weet je het zeker?", 
            "Huh, mis!", "Klik de groene!", "Mijn hart breekt..", 
            "Geef maar op! 😉", "Nog steeds nee?!"
        ];

        const emojis = ["👉👈", "🥺", "🧐", "😭", "😤", "🙄", "😈"];

        // STAP 2: Het 'Oops' scherm tonen
        function triggerOopsScreen() {
            if (step === 1) {
                step = 2;

                icon.innerText = "🤭";
                title.innerHTML = "Oeps...";
                question.innerHTML = "Dit is eigenlijk helemaal geen recept...";
                
                // Verander de grote knop tijdelijk naar 'Ok...'
                yesBtn.innerText = "Ok...";
                yesBtn.style.background = "#34495e"; // Neutrale donkere kleur voor de spanning
                yesBtn.setAttribute("onclick", "revealDatePrompt()");
            }
        }

        // STAP 3: De echte date vraag activeren
        function revealDatePrompt() {
            if (step === 2) {
                step = 3;
                
                // Activeer de roze date-modus styling via de body class
                document.body.classList.add('date-mode');
                
                // Update naar de echte vraag
                icon.innerText = "👉👈";
                icon.style.fontSize = "65px";
                title.innerHTML = "Verrassing! 🎉";
                question.innerHTML = "We gaan lekker níét koken. Ik neem je gewoon mee uit eten! Wil je met mij op date? ❤️";
                
                // Zet de JA-knop naar de feestelijke groene modus
                yesBtn.innerText = "JA! 🎉";
                yesBtn.style.background = ""; // Reset naar de CSS gradient van date-mode
                yesBtn.setAttribute("onclick", "celebrate()");
                
                // Toon de NEE-knop. Dankzij flexbox staan ze nu PERFECT strak naast elkaar!
                noBtn.style.display = "inline-block";
            }
        }

        // Het weglopende mechanisme (Gebeurt pas als ze in stap 3 op NEE tikt)
        function moveButton(event) {
            if (event) event.preventDefault();

            noCount++;
            
            noBtn.innerText = noTexts[Math.min(noCount, noTexts.length - 1)];
            icon.innerText = emojis[Math.min(noCount, emojis.length - 1)];

            // JA-knop groeit groter vanuit het midden
            yesSize += 0.25;
            yesBtn.style.transform = `scale(${yesSize})`;

            // Breek de Nee-knop NU pas los uit de flexbox-structuur van de kader
            if (noBtn.style.position !== 'absolute') {
                noBtn.style.position = 'absolute';
                document.body.appendChild(noBtn); // Verplaats naar de body zodat hij overal kan vliegen
            }

            const containerRect = mainContainer.getBoundingClientRect();
            const padding = 25;
            const btnWidth = noBtn.offsetWidth;
            const btnHeight = noBtn.offsetHeight;

            let randomX, randomY;
            let insideContainer = true;

            // Intelligentie-check: Zorg dat hij ALTIJD buiten de witte kader terecht komt
            while (insideContainer) {
                randomX = Math.max(padding, Math.floor(Math.random() * (window.innerWidth - btnWidth - padding)));
                randomY = Math.max(padding, Math.floor(Math.random() * (window.innerHeight - btnHeight - padding)));

                const hitsContainerX = (randomX + btnWidth > containerRect.left - 15) && (randomX < containerRect.right + 15);
                const hitsContainerY = (randomY + btnHeight > containerRect.top - 15) && (randomY < containerRect.bottom + 15);

                if (!(hitsContainerX && hitsContainerY)) {
                    insideContainer = false; 
                }
            }

            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
        }

        // De overwinning via WhatsApp
        function celebrate() {
            confetti({ particleCount: 160, spread: 80, origin: { y: 0.6 } });

            icon.innerText = "🥰🎉";
            title.innerHTML = "Woehoe, JA! 🥂❤️";
            question.innerHTML = "Beste keuze ooit! Je wordt nu doorgestuurd naar WhatsApp om het te bezegelen...";
            
            btnContainer.style.display = 'none';
            noBtn.style.display = 'none';

            setTimeout(() => {
                const text = encodeURIComponent("Ja, ik wil heel graag met je op date! Geen gnocchi, maar echt uit eten! 🥂❤️");
                window.location.href = `https://wa.me/?text=${text}`;
            }, 1800);
        }
    </script>

</body>
</html>
